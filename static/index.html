<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter Reader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Chapter Reader</h1>
    <p class="tagline">Paste any long-form text · hear it read aloud · fully local</p>
  </header>

  <main>
    <section class="controls-top">
      <label>
        Engine
        <select id="engine"></select>
      </label>
      <label>
        Voice
        <select id="voice"></select>
      </label>
      <label class="speed-label">
        Speed <span id="speedVal">0.95</span>
        <input type="range" id="speed" min="0.8" max="1.2" step="0.05" value="0.95" />
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="stripMd" checked />
        Strip markdown
      </label>
    </section>

    <textarea
      id="text"
      placeholder="Paste a chapter, article, or markdown notes…"
      spellcheck="true"
    ></textarea>

    <section class="controls-bottom">
      <button type="button" id="play" class="primary">Play</button>
      <button type="button" id="pause" disabled>Pause</button>
      <button type="button" id="stop" disabled>Stop</button>
      <span id="status" class="status" aria-live="polite"></span>
    </section>

    <div class="progress-wrap" hidden>
      <progress id="progress" max="100" value="0"></progress>
      <span id="progressLabel"></span>
    </div>
  </main>

  <footer>
    <p id="engineNote">Loading engines…</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
